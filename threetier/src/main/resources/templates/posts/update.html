<!doctype html>
<html lang="en" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>게시글 수정</title>
</head>
<body>
    <form th:action="@{/posts/update}" method="post" th:object="${post}">
        <input type="hidden" th:field="*{id}">
        <div>
            <span>제목</span>
            <input type="text" th:field="*{postTitle}" placeholder="제목을 입력하세요">
        </div>
        <div>
            <span>내용</span>
            <input type="text" th:field="*{postContent}" placeholder="내용을 입력하세요">
        </div>
        <button type="button">수정하기</button>
    </form>
</body>
<script>
    const btn = document.querySelector("button");
    const inputs = document.querySelectorAll("input");
    const form = document.querySelector("form");

    btn.addEventListener("click", () => {
        for(let input of inputs){
            if(input.value == "" || input.value == null){
                return alert(input.value + "를 입력하셔야 합니다.");
            }
        }
        form.submit();
    })
</script>
</html>
