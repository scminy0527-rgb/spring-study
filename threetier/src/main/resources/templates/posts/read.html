<!doctype html>
<html lang="en" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>게시글 상세보기</title>
</head>
<body>
    <th:block th:object="${post}">
        <p th:text="*{postTitle}"></p>
        <p th:text="*{postContent}"></p>
        <p th:text="*{postReadCount}"></p>
        <p th:text="*{memberName}"></p>

        <button th:onclick="|location.href='@{/posts/update(id=*{id})}'|">수정 하기</button>
        <form th:action="@{/posts/delete(id=*{id})}" method="post">
            <button>게시글 삭제</button>
        </form>
    </th:block>
</body>
</html>
