<!doctype html>
<html lang="en" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>점수 등록</title>
    <style>
        input {
            display: block;
        }
    </style>
</head>
<body>
    <form th:action="@{/tasks/result}" th:object="${taskVO}">
        <input type="number" th:field="*{kor}" placeholder="국어 점수를 입력하세요">
        <input type="number" th:field="*{eng}" placeholder="영어 점수를 입력하세요">
        <input type="number" th:field="*{math}" placeholder="수학 점수를 입력하세요">
        <button>계산</button>
    </form>
</body>
</html>
